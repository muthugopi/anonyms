<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    {% block extra_css %} {% endblock %}
</head>

<body class="bg-body-tertiary text-body">

    <div class="d-flex min-vh-100">

        <aside class="d-none d-md-flex flex-column vh-100 bg-body border-end position-sticky top-0 overflow-y-auto" style="min-width: 280px; max-width: 280px;">
            
            <div class="p-4 border-bottom border-light-subtle">
                <h5 class="fw-bold mb-0 d-flex align-items-center gap-2 text-body-emphasis">
                    <span class="bg-primary text-white d-flex align-items-center justify-content-center rounded-3 fw-bold text-center shadow-sm" style="width: 32px; height: 32px; font-size: 0.95rem;">A</span> 
                    <span>ConsoleAdmin</span>
                </h5>
            </div>

            <nav class="p-3 flex-grow-1 d-flex flex-column gap-1">
                <div class="mb-2 ps-3 text-uppercase text-body-secondary fw-bold" style="font-size: 0.7rem; letter-spacing: 0.08em;">Menu</div>

                <a href="#" class="link-secondary d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-decoration-none fw-medium">
                    <i class="bi bi-grid fs-5"></i> <span class="small">Dashboard</span>
                </a>
                
                <a href="{% url 'admin-dashboard' %}" class="d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-decoration-none bg-primary-subtle text-primary-emphasis fw-semibold">
                    <i class="bi bi-people fs-5"></i> <span class="small">Users</span>
                </a>
                
                <a href="#" class="link-secondary d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-decoration-none fw-medium">
                    <i class="bi bi-hdd-stack fs-5"></i> <span class="small">Database</span>
                </a>
                
                <a href="#" class="link-secondary d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-decoration-none fw-medium">
                    <i class="bi bi-gear fs-5"></i> <span class="small">Settings</span>
                </a>
            </nav>

            <div class="p-3 border-top border-light-subtle mt-auto">
                <a href="{% url 'logout' %}" class="link-danger d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-decoration-none fw-medium">
                    <i class="bi bi-box-arrow-left fs-5"></i> <span class="small">Sign Out</span>
                </a>
            </div>
        </aside>

        <main class="flex-grow-1 d-flex flex-column min-w-0">

            <header class="d-flex align-items-center justify-content-between px-4 px-lg-5 bg-body border-bottom position-sticky top-0 z-3" style="min-height: 72px;">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-light d-md-none border p-2 rounded-3" type="button" aria-label="Toggle Navigation">
                        <i class="bi bi-list fs-5"></i>
                    </button>
                    <h4 class="mb-0 fs-6 fw-bold text-body-emphasis text-uppercase" style="letter-spacing: 0.5px;">
                        {% block page_title %}Overview{% endblock %}
                    </h4>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <span class="small text-body-secondary fw-semibold d-none d-sm-inline">Admin User</span>
                    <div class="bg-body-secondary text-body-emphasis border rounded-circle d-flex align-items-center justify-content-center fw-bold shadow-sm" style="width: 38px; height: 38px; font-size: 0.85rem;">
                        AU
                    </div>
                </div>
            </header>

            <div class="p-4 p-lg-5 flex-grow-1">
                {% block content %}
                {% endblock %}
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
