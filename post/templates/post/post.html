{% extends 'core/base.html' %}
{% block content %}

{% for post in posts %}
<div class="card bg-body border-light-subtle shadow-sm my-4 mx-md-5 rounded-4">
    <div class="card-body p-4">
        
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="badge rounded-pill bg-info-subtle text-info-emphasis px-3 py-2 border border-info-subtle text-uppercase font-monospace" style="font-size: 0.75rem; letter-spacing: 0.5px;">
                Conference #{{ post.id }}
            </span>

            <form action="{% url 'delete-post' post.id %}" method="POST" class="m-0" onsubmit="return confirm('Are you sure you want to permanently delete this post?');">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-danger d-flex align-items-center gap-2 rounded-3 px-3 py-1 fw-medium" style="font-size: 0.8rem;">
                    <i class="bi bi-trash"></i> Delete
                </button>
            </form>
        </div>

        <h2 class="fw-bold text-body-emphasis mb-3 lh-sm fs-3">
            {{ post.title }}
        </h2>
        
        <p class="text-body-secondary mb-0" style="font-size: 0.95rem; line-height: 1.6;">
            {{ post.description }}
        </p>

    </div>
</div>
{% empty %}
<div class="text-center py-5 my-5 text-body-secondary">
    <div class="display-5 mb-3 text-secondary text-opacity-50">
        <i class="bi bi-folder-x"></i>
    </div>
    <h5 class="fw-bold text-body-emphasis">No posts found</h5>
    <p class="small text-body-secondary mx-auto" style="max-width: 360px;">New conference posts will appear here once they are created.</p>
</div>
{% endfor %}

{% endblock %}
